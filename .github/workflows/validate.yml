name: Validation

on:
  push:
    branches: ["master"]
    tags-ignore: ["*"]
  pull_request:
    branches: ["master"]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  validate:
    name: ${{ matrix.os_name }} - ${{ github.event_name == 'pull_request' && 'Clippy' || 'Check' }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            os_name: Windows
          - os: macos-15
            os_name: macOS

    steps:
      - uses: actions/checkout@v6

      - name: Guard against legacy UI runtime dependency regressions
        run: python scripts/check_no_qt_runtime_deps.py

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - uses: swatinem/rust-cache@v2

      - name: Run Clippy
        if: github.event_name == 'pull_request'
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Run Check
        if: github.event_name != 'pull_request'
        run: cargo check --workspace --all-targets
