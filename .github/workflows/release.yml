name: Build and Package

on:
  push:
    tags: ["v*"]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build on ${{ matrix.os_name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            os_name: Windows

    steps:
      - uses: actions/checkout@v6

      - name: Guard against legacy UI runtime dependency regressions
        run: python scripts/check_no_qt_runtime_deps.py

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2

      - name: Build and Package
        shell: bash
        run: python scripts/bundle.py

      - name: Upload Artifacts
        uses: actions/upload-artifact@v7
        with:
          name: MinnowSnap-${{ matrix.os_name }}
          path: |
            target/deploy/*.zip
          if-no-files-found: error
